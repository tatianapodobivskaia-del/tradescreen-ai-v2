# Tradescreen Ai V2 Workflow Add Or Update App Page

## Action

Follow the add-or-update-app-page workflow:
1. Create or modify a file in client/src/pages/PageName.tsx
2. Update navigation or layout components in client/src/components/AppLayout.tsx or client/src/components/shared.tsx to include the new/updated page
3. Update client/src/App.tsx to register the new route or adjust routing logic
4. Optionally update client/src/pages/Landing.tsx if the landing page references the new/updated page

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: client/src/pages/*.tsx, client/src/components/AppLayout.tsx, client/src/components/shared.tsx

